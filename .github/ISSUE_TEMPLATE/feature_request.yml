name: Feature request
description: Suggest a new feature or improvement.
title: 'feat: '
labels: ['enhancement', 'triage']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what's awkward? Skip the proposed solution for now.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: API shape, examples, or sketches welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - 'API addition (new export / option)'
        - 'API change (breaking)'
        - 'Performance'
        - 'Docs / examples'
        - 'Tooling / CI'
        - 'Other'
    validations:
      required: true
